name: BookingYa - Pipeline de pruebas (TDD / BDD / Summary)

on:
  push:
    branches: [ main, estudiantes ]
  pull_request:
    branches: [ main, estudiantes ]

jobs:
  fase1-tdd:
    name: FASE 1 - TDD (JUnit 5 + Mockito)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ['17']
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v3
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Compilar y ejecutar pruebas unitarias (TDD)
        run: mvn -B -V clean test

      - name: Generar reporte surefire
        if: always()
        run: mvn surefire-report:report || true

      - name: Subir artefactos TDD
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fase1-tdd-reports
          path: |
            target/site/surefire-report.html
            target/surefire-reports/**

  fase2-bdd:
    name: FASE 2 - BDD (Serenity + Cucumber)
    runs-on: ubuntu-latest
    needs: fase1-tdd
    strategy:
      matrix:
        java-version: ['17']
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v3
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar pruebas BDD (Serenity/Cucumber)
        run: mvn -B -V verify

      - name: Subir artefactos BDD
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fase2-bdd-reports
          path: |
            target/site/serenity/**
            target/cucumber-reports/**
            target/site/*

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [fase1-tdd, fase2-bdd]
    steps:
      - name: Descargar artefactos FASE 1
        uses: actions/download-artifact@v4
        with:
          name: fase1-tdd-reports
          path: artifacts/fase1

      - name: Descargar artefactos FASE 2
        uses: actions/download-artifact@v4
        with:
          name: fase2-bdd-reports
          path: artifacts/fase2

      - name: Mostrar resumen rápido de artefactos
        run: |
          echo "=== Listado de artefactos descargados (artifacts/) ==="
          if [ -d artifacts ]; then
            ls -la artifacts || true
            ls -R artifacts || true
          else
            echo "No se encontraron artefactos descargados"
          fi
          echo "\n✅ Jobs completados: ${GITHUB_REF}" || true

      - name: Publicar informe agregado (si existe)
        if: always()
        run: |
          # Buscar reportes de surefire en artifacts/fase1
          if [ -f artifacts/fase1/target/site/surefire-report.html ]; then
            echo "Surefire report disponible: artifacts/fase1/target/site/surefire-report.html"
          elif [ -f artifacts/fase1/surefire-report.html ]; then
            echo "Surefire report disponible: artifacts/fase1/surefire-report.html"
          else
            echo "No se encontró surefire report en artifacts/fase1"
          fi

          # Buscar reportes de Serenity en artifacts/fase2
          if [ -d artifacts/fase2/target/site/serenity ]; then
            echo "Serenity report disponible en: artifacts/fase2/target/site/serenity"
          elif [ -d artifacts/fase2/site/serenity ]; then
            echo "Serenity report disponible en: artifacts/fase2/site/serenity"
          else
            echo "No se encontró Serenity report en artifacts/fase2"
          fi
