name: FASE 1 & 2 - TDD + BDD Testing

on:
  push:
    branches: [ "main", "estudiantes", "develop" ]
  pull_request:
    branches: [ "main", "estudiantes", "develop" ]

jobs:
  fase1-tdd:
    name: FASE 1 - TDD (JUnit 5 + Mockito)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Fase 1 (TDD)
        working-directory: ./fase1
        run: mvn clean compile

      - name: Run TDD Tests (JUnit 5 + Mockito)
        working-directory: ./fase1
        run: mvn test

      - name: Display Test Results
        if: always()
        working-directory: ./fase1
        run: |
          echo "=== FASE 1 - TDD Tests Complete ==="
          find target/surefire-reports -name "*.txt" -exec echo {} \; -exec cat {} \;

  fase2-bdd:
    name: FASE 2 - BDD (Serenity + Cucumber)
    runs-on: ubuntu-latest
    needs: fase1-tdd

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Fase 2 (BDD)
        working-directory: ./fase2
        run: mvn clean compile

      - name: Run BDD Tests (Serenity + Cucumber)
        working-directory: ./fase2
        run: mvn verify

      - name: Generate Serenity Report
        if: always()
        working-directory: ./fase2
        run: mvn serenity:aggregate

      - name: Upload Serenity Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-html-report
          path: fase2/target/site/serenity/

      - name: Display BDD Test Summary
        if: always()
        working-directory: ./fase2
        run: |
          echo "=== FASE 2 - BDD Tests Complete ==="
          find target/surefire-reports -name "*.txt" -exec echo {} \; -exec cat {} \;

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [fase1-tdd, fase2-bdd]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test Status Report
        run: |
          echo "╔═══════════════════════════════════════╗"
          echo "║   BookingYa - Testing Pipeline        ║"
          echo "╚═══════════════════════════════════════╝"
          echo ""
          echo "✓ FASE 1 - TDD (JUnit 5 + Mockito): ${{ needs.fase1-tdd.result }}"
          echo "✓ FASE 2 - BDD (Serenity + Cucumber): ${{ needs.fase2-bdd.result }}"
          echo ""
          if [ "${{ needs.fase1-tdd.result }}" == "success" ] && [ "${{ needs.fase2-bdd.result }}" == "success" ]; then
            echo "🎉 ALL TESTS PASSED!"
            exit 0
          else
            echo "❌ SOME TESTS FAILED - See logs above"
            exit 1
          fi
