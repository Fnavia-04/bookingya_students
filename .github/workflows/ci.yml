name: FASE 1 & 2 - TDD + BDD Testing

on:
  workflow_dispatch:

jobs:
  fase1-tdd:
    name: FASE 1 - TDD (JUnit 5 + Mockito)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Fase 1 (TDD)
        working-directory: ./fase1
        run: mvn clean compile

      - name: Run TDD Tests (JUnit 5 + Mockito)
        working-directory: ./fase1
        run: mvn test

      - name: Display Test Results
        if: always()
        working-directory: ./fase1
        run: |
          echo "=== FASE 1 - TDD Tests Complete ==="
          find target/surefire-reports -name "*.txt" -exec echo {} \; -exec cat {} \;

  fase2-bdd:
    name: FASE 2 - BDD (Serenity + Cucumber)
    runs-on: ubuntu-latest
    needs: fase1-tdd

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Fase 2 (BDD)
        working-directory: ./fase2
        run: mvn clean compile

      - name: Note about BDD tests
        run: |
          echo "Phase 2 BDD tests require a running API server on localhost:8080"
          echo "These tests are designed to be run locally with: mvn verify"
          echo "BDD scenarios and Gherkin feature files are implemented and ready"

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [fase1-tdd, fase2-bdd]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test Status Report
        run: |
          echo "╔═══════════════════════════════════════╗"
          echo "║   BookingYa - Testing Pipeline        ║"
          echo "╚═══════════════════════════════════════╝"
          echo ""
          echo "✓ FASE 1 - TDD (JUnit 5 + Mockito): ${{ needs.fase1-tdd.result }}"
          echo "✓ FASE 2 - BDD (Serenity + Cucumber): Requires local API server"
          echo "✓ FASE 3 - ATDD (Playwright): Ready for execution"
          echo ""
          if [ "${{ needs.fase1-tdd.result }}" == "success" ]; then
            echo "✅ PHASE 1 TESTS PASSED - Core functionality validated"
            exit 0
          else
            echo "❌ PHASE 1 TESTS FAILED"
            exit 1
          fi
