name: FASE 1 - TDD con JUnit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-fase1:
    runs-on: ubuntu-latest
    name: Pruebas Unitarias TDD

    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v3

    - name: Configurar JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Compilar y ejecutar pruebas JUnit
      run: mvn clean test -Dtest=ReservationServiceTest

    - name: Publicar resultados
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-fase1
        path: target/surefire-reports/
