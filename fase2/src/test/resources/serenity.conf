# Serenity BDD configuration
# Este archivo es leído automáticamente por Serenity en tiempo de ejecución.

serenity {
  # Título que aparece en el reporte HTML
  project.name = "BookingYa — BDD con Serenity + Cucumber"

  # Directorio de reportes (relativo al módulo)
  outputDirectory = "target/site/serenity"

  # Incluye capturas de pantalla en cada paso (útil si se agrega un navegador)
  take.screenshots = FOR_FAILURES
  
  # Configuración adicional
  report.title = "BookingYa BDD Test Results"
  report.show.step.details = true
}

# REST Assured — URL base del sistema bajo prueba
restassured {
  baseURI = "http://localhost:8080"
  basePath = "/api"
}
